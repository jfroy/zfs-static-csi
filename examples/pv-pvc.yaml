# Prerequisite on the storage node:
#   zfs set com.github.jfroy.zfs-static-csi:share=on tank/data/myapp
#
# The "zfs-static" StorageClass is created by the Helm chart by default;
# adjust storageClassName below if you renamed it via storageClass.name.
---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: myapp-data
spec:
  capacity:
    # Metadata only; the driver does not enforce capacity.
    storage: 100Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: zfs-static
  mountOptions:
    - noatime
  csi:
    driver: zfs-static-csi.jfroy.github.com
    # volumeHandle IS the dataset name.
    volumeHandle: tank/data/myapp
  nodeAffinity:
    required:
      nodeSelectorTerms:
        - matchExpressions:
            - key: topology.zfs-static-csi.jfroy.github.com/hostname
              operator: In
              values:
                - storage-node-1
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: myapp-data
spec:
  storageClassName: zfs-static
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 100Gi
  volumeName: myapp-data
