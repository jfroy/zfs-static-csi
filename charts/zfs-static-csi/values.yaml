nameOverride: ""
fullnameOverride: ""

image:
  repository: ghcr.io/jfroy/zfs-static-csi
  pullPolicy: IfNotPresent
  # Empty falls back to Chart.AppVersion.
  tag: ""

driverName: zfs-static-csi.jfroy.github.com

# Path at which the host root is bind-mounted into the container. Used both
# as the bind-mount source prefix and as the chroot dir for zfs(8). Empty
# disables both; the image does not bundle zfs userspace.
hostPrefix: /host

# Override path to the zfs binary inside hostPrefix. Empty auto-searches
# /usr/sbin, /sbin, /usr/local/sbin, /usr/local/bin.
zfsBinary: ""

logLevel: 2

# /var/lib/kubelet on stock kubeadm; k0s, microk8s and friends override.
kubeletDir: /var/lib/kubelet

nodeDriverRegistrar:
  image:
    repository: registry.k8s.io/sig-storage/csi-node-driver-registrar
    tag: v2.16.0
    pullPolicy: IfNotPresent

# Constrain placement with nodeSelector or affinity. For label-existence
# (e.g. Talos's extensions.talos.dev/zfs), use affinity:
#
#   affinity:
#     nodeAffinity:
#       requiredDuringSchedulingIgnoredDuringExecution:
#         nodeSelectorTerms:
#           - matchExpressions:
#               - key: extensions.talos.dev/zfs
#                 operator: Exists
nodeSelector: {}
affinity: {}

tolerations:
  - operator: Exists

priorityClassName: system-node-critical

resources: {}

# fsGroupPolicy=None: kubelet does not recursively chown volume contents.
# Switch to File only for single-tenant datasets you're willing to mutate.
csiDriver:
  fsGroupPolicy: None
  attachRequired: false
  podInfoOnMount: false

serviceAccount:
  create: true
  name: ""
  annotations: {}

storageClass:
  create: true
  name: zfs-static
  reclaimPolicy: Retain
  volumeBindingMode: WaitForFirstConsumer
  annotations: {}

updateStrategy:
  type: RollingUpdate
  rollingUpdate:
    maxUnavailable: 1
